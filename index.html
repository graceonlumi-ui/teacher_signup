<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연수 등록 서명</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="form-header">
            <h1 id="main-title">📝 연수 서명</h1>
            <p id="sub-title">이름을 선택하고 서명해 주세요.</p>
        </header>

        <main class="form-content">
            <form id="submit-form">
                
                <!-- 이름 선택 (드롭다운) -->
                <div class="input-group">
                    <label for="student-name">성명</label>
                    <div class="select-wrapper">
                        <select id="student-name" required>
                            <option value="" disabled selected>이름을 선택하세요 (관리자 명단)</option>
                            <!-- 스크립트로 옵션이 동적으로 채워집니다 -->
                        </select>
                    </div>
                </div>

                <!-- 전자 서명 (위로 이동) -->
                <div class="input-group signature-group" id="group-signature">
                    <div class="signature-header">
                        <label>전자 서명</label>
                        <button type="button" class="btn-text" onclick="clearSignature()">지우기 ↺</button>
                    </div>
                    <div class="canvas-wrapper">
                        <canvas id="signature-pad"></canvas>
                    </div>
                    <p class="help-text">마우스나 손가락을 이용해 위 영역에 서명해 주세요.</p>
                </div>
                
                <!-- 제출 자료 (아래로 이동) -->
                <div class="input-group" id="group-file">
                    <label for="upload-file">제출 자료 (선택사항)</label>
                    <input type="file" id="upload-file" class="file-input">
                </div>

                <button type="submit" class="btn btn-primary btn-large" id="submit-btn">등록 및 제출하기</button>
            </form>
        </main>
    </div>

    <!-- 로딩 오버레이 -->
    <div class="overlay" id="loading-overlay">
        <div class="spinner"></div>
        <p>제출 중입니다...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
