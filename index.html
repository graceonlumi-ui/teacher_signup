<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연수 등록부</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="form-header">
            <h1>📝 연수 등록부</h1>
            <p>참석자 정보를 입력하고 서명해 주세요.</p>
        </header>

        <main class="form-content">
            <form id="submit-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="affiliation">소속 (학교명 등)</label>
                        <input type="text" id="affiliation" required placeholder="예: 한국중학교">
                    </div>
                    
                    <div class="input-group">
                        <label for="student-name">성명</label>
                        <input type="text" id="student-name" required placeholder="예: 홍길동">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="upload-file">제출 자료 (선택사항, PDF/이미지 등)</label>
                    <input type="file" id="upload-file">
                </div>

                <div class="input-group signature-group">
                    <div class="signature-header">
                        <label>전자 서명</label>
                        <button type="button" class="btn-text" onclick="clearSignature()">지우기 ↺</button>
                    </div>
                    <div class="canvas-wrapper">
                        <canvas id="signature-pad"></canvas>
                    </div>
                    <p class="help-text">마우스나 손가락을 이용해 위 영역에 서명해 주세요.</p>
                </div>

                <button type="submit" class="btn btn-primary btn-large" id="submit-btn">등록 및 제출하기</button>
            </form>
        </main>
    </div>

    <!-- 로딩 오버레이 -->
    <div class="overlay" id="loading-overlay">
        <div class="spinner"></div>
        <p>제출 중입니다...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
